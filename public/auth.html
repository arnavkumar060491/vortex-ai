<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vortex AI Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.auth-box{
    width:350px;
    background:#111827;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,255,255,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#06b6d4,#6366f1);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.switch{
    text-align:center;
    margin-top:15px;
    cursor:pointer;
    color:#60a5fa;
}

#error{
    color:#ff6b6b;
    margin-top:10px;
    text-align:center;
}

</style>
</head>
<body>

<div class="auth-box">

<h1 id="title">Login</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="submitAuth()">Continue</button>

<div class="switch" onclick="toggleMode()">
    Don't have an account? Sign Up
</div>

<div id="error"></div>

</div>

<script>

let isLogin = true;

function toggleMode(){

    isLogin = !isLogin;

    document.getElementById('title').textContent =
        isLogin ? 'Login' : 'Sign Up';

    document.querySelector('.switch').textContent =
        isLogin
        ? "Don't have an account? Sign Up"
        : "Already have an account? Login";

}

async function submitAuth(){

    const username =
        document.getElementById('username').value.trim();

    const password =
        document.getElementById('password').value.trim();

    const error =
        document.getElementById('error');

    error.textContent = '';

    if(!username || !password){

        error.textContent = 'Fill all fields';
        return;

    }

    const endpoint =
        isLogin ? '/api/login' : '/api/signup';

    try{

        const response = await fetch(endpoint,{
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({
                username,
                password
            })
        });

        const data = await response.json();

        if(data.success){

            localStorage.setItem(
                'vortexUser',
                username
            );

            window.location.href = '/';

        }else{

            error.textContent = data.error;

        }

    }catch(err){

        error.textContent = 'Server error';

    }

}

</script>

</body>
</html>
